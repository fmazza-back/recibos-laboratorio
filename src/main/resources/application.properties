spring.application.name=recibo
server.port=${RECIBO_PORT:8080}
server.address=0.0.0.0

eureka.client.service-url.defaultZone=${URL_EUREKA}

spring.config.import=optional:classpath:dev.properties

# H2
spring.datasource.url=jdbc:h2:mem:recibodb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Google Drive
google.drive.folder-id=${GOOGLE_DRIVE_FOLDER_ID:}

# --- Configuración de Instancia de Eureka para Entorno Local ---
# Le dice a Eureka que use el nombre del host de la máquina en lugar de la IP.
eureka.instance.hostname=localhost
# Habilita el puerto no seguro (HTTP) para el registro en Eureka.
eureka.instance.non-secure-port-enabled=true
# Deshabilita el puerto seguro (HTTPS), ya que no se usa en local.
eureka.instance.secure-port-enabled=false
# El status y health check se harán sobre HTTP.
eureka.instance.status-page-url=http://${eureka.instance.hostname}:${server.port}/actuator/info
eureka.instance.health-check-url=http://${eureka.instance.hostname}:${server.port}/actuator/health
eureka.instance.home-page-url=http://${eureka.instance.hostname}:${server.port}/
# Intervalos de comunicación con Eureka
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30
